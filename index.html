<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- INTEGRASI FAVICON & MANIFEST -->
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />

    <!-- METADATA SEO UTAMA -->
    <title>Kursus IELTS Band 9 Yogyakarta & English Korporat - ETK Global</title>
    <meta name="description" content="Kursus IELTS terbaik di Yogyakarta & pelatihan English korporat. Hubungi ETK Global Yogyakarta untuk akselerasi Band 9 dengan metode PPS eksekutif serta silabus lengkap kelas korporat, Prometric, dan komunikasi bisnis.">
    <meta name="keywords" content="kursus ielts yogyakarta, ielts band 9 jogja, english for job interview jogja, pelatihan bahasa inggris korporat yogyakarta, silabus english corporate, prometric nurse jogja">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0b1329">
    
    <link rel="canonical" href="https://gyoutrain-lab.github.io/ETKGlobal/">

    <!-- OPEN GRAPH CONFIGURATION -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gyoutrain-lab.github.io/ETKGlobal/">
    <meta property="og:title" content="Kursus IELTS Band 9 Yogyakarta & English Korporat | ETK Global">
    <meta property="og:description" content="Lembaga pelatihan bahasa Inggris korporat dengan pendekatan PPS, akselerasi IELTS Band 9, dan transformasi karir global di Yogyakarta.">
    <meta property="og:image" content="https://raw.githubusercontent.com/gyoutrain-lab/ETKGlobal/main/Header%20Cr.jpg">

    <!-- JSON-LD SCHEMA MARKUP -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "ETK Global Yogyakarta",
      "description": "Pusat akselerasi komunikasi bisnis, kursus persiapan IELTS Band 9, dan pelatihan Prometric Nursing Test di Yogyakarta.",
      "url": "https://gyoutrain-lab.github.io/ETKGlobal/",
      "logo": "https://raw.githubusercontent.com/gyoutrain-lab/ETKGlobal/main/Logo%20ETK%20Cr.png",
      "telephone": "+62-819-0168-5253",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Panjen Tajem, Maguwoharjo, Depok",
        "addressLocality": "Sleman",
        "addressRegion": "Daerah Istimewa Yogyakarta",
        "postalCode": "55281",
        "addressCountry": "ID"
      }
    }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #0b1329; 
            color: #cbd5e1;
            line-height: 1.7;
        }
        .container {
            width: 92%;
            max-width: 1240px;
            margin: 0 auto;
        }

        /* NAVIGATION BAR */
        header {
            position: sticky;
            top: 0;
            z-index: 999; 
            box-shadow: 0 10px 35px rgba(0,0,0,0.6); 
        }
        .header-problem-banner {
            background-color: #dc2626; 
            padding: 14px 0;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .problem-banner-text {
            color: #ffffff;
            font-size: 20px;
            font-weight: 800;
        }
        .problem-banner-text .gold-trigger {
            color: #facc15; 
            font-size: 24px;
            font-weight: 900;
        }

        .header-main-bar {
            background: linear-gradient(135deg, #0d9488 0%, #115e59 100%); 
            border-bottom: 2px solid #14b8a6;
            padding: 25px 0; 
            position: relative;
            z-index: 1;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* WRAPPER KONTEN LOGO & BACKGROUND */
        .logo-solution-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            min-width: 420px; 
        }

        /* ELEMEN BACKGROUND KHUSUS: Di depan warna bar, membentang penuh 0 atas & bawah, di belakang logo */
        .logo-bg-future {
            position: fixed;
            top: 0;
            left: 0;
            /* Mengukur tinggi total header dari bar merah hingga batas bawah bar biru secara dinamis */
            height: calc(20px + 28px + 2px + 130px - 40px); 
            height: 100%;
            position: absolute;
            top: -53px; /* Menarik ke atas menyentuh 0 margin atas bar merah */
            height: 200px; /* Menyesuaikan tinggi total keseluruhan bar */
            width: 400px; /* Batas lebar background */
            pointer-events: none;
            z-index: 1;
            
            background-image: 
                linear-gradient(to right, rgba(13, 148, 136, 0) 40%, rgba(13, 148, 136, 0.8) 75%, #0d9488 95%),
                linear-gradient(to bottom, rgba(220, 38, 38, 0) 20%, rgba(13, 148, 136, 0) 30%),
                url('https://raw.githubusercontent.com/gyoutrain-lab/ETKGlobal/main/ETK_Future.png');
            background-repeat: no-repeat;
            background-position: left center;
            background-size: auto 100%;
        }

        .logo img {
            height: 130px; 
            width: auto;
            position: absolute;
            top: -65px; 
            left: 0;
            z-index: 2; /* Menjamin logo utama berada di paling depan */
        }
        .solution-callout {
            display: flex;
            flex-direction: column;
            margin-left: 140px;
            z-index: 2;
        }
        .solution-tag {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 900;
            color: #ffffff; 
            background-color: #ef4444; 
            padding: 3px 8px;
            border-radius: 4px;
            align-self: flex-start;
        }
        .solution-text {
            color: #facc15; 
            font-size: 15px;
            font-weight: 800;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .solution-text span {
            font-weight: 400;
            color: #e2fbf7;
        }

        /* 3D GRADATED DARK BLUE NAVIGATION LINKS */
        nav {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            z-index: 2;
        }
        nav a {
            text-decoration: none;
            color: #e2fbf7; 
            font-weight: 700; 
            font-size: 15px; 
            padding: 12px 20px;
            border-radius: 8px;
            
            background: linear-gradient(180deg, #253a66 0%, #121f3d 100%);
            
            border-top: 1px solid #3d5a99;
            border-left: 1px solid #253a66;
            border-right: 1px solid #253a66;
            border-bottom: none;

            box-shadow: 
                0 4px 0px #0a1224, 
                0 6px 15px rgba(0, 0, 0, 0.5),
                inset 0 1px 2px rgba(255, 255, 255, 0.15);
                
            text-shadow: 0 -1px 1px rgba(0, 0, 0, 0.7);
            transition: all 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            top: 0;
        }
        
        nav a:hover { 
            color: #ffffff;
            background: linear-gradient(180deg, #2d477c 0%, #17284e 100%);
            box-shadow: 
                0 5px 0px #0a1224, 
                0 8px 20px rgba(0, 0, 0, 0.6),
                inset 0 1px 2px rgba(255, 255, 255, 0.25);
            top: -2px;
        }

        nav a:active {
            top: 3px;
            box-shadow: 
                0 1px 0px #0a1224, 
                0 2px 5px rgba(0, 0, 0, 0.4),
                inset 0 1px 4px rgba(0, 0, 0, 0.6);
        }

        /* CONTENT CONTAINER (DIPAKAI UNTUK HALAMAN ASLI ANDA TANPA PERUBAHAN LAYOUT) */
        .main-content {
            padding: 60px 0;
            min-height: 60vh;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 992px) {
            .logo-bg-future { display: none; } /* Menyembunyikan background khusus di mobile agar layout tetap rapi */
            .logo img { position: static; height: 100px; margin: 0 auto; }
            .solution-callout { margin-left: 0; align-items: center; text-align: center; }
            .logo-solution-wrapper { min-width: auto; flex-direction: column; gap: 10px; }
            .header-flex { flex-direction: column; gap: 20px; }
            nav { justify-content: center; gap: 10px; }
            nav a { padding: 10px 14px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <!-- BACKGROUND DENGAN GRADASI BERADA DI SINI, DI DEPAN WARNA BAR, NAMUN DI BELAKANG LOGO -->
        <div class="logo-bg-future"></div>

        <div class="header-problem-banner">
            <div class="container">
                <div class="problem-banner-text">
                    Stuck in Local Salary due to English Blocks? Unlock your <span class="gold-trigger">International Career</span> Now!
                </div>
            </div>
        </div>
        
        <div class="header-main-bar">
            <div class="container header-flex">
                <div class="logo-solution-wrapper">
                    <div class="logo">
                        <a href="#home">
                            <img src="https://raw.githubusercontent.com/gyoutrain-lab/ETKGlobal/main/Logo%20ETK%20Cr.png" alt="ETK Global Kursus Inggris & IELTS Yogyakarta">
                        </a>
                    </div>
                    <div class="solution-callout">
                        <span class="solution-tag">The Absolute Solution</span>
                        <div class="solution-text">Akurat, Tepat & Modern <span>untuk Akselerasi Karir Global</span></div>
                    </div>
                </div>

                <!-- NAVIGATION BAR DENGAN DESAIN 3D COLOURED GRADATED DARK BLUE -->
                <nav>
                    <a href="#dashboard">Dashboard</a>
                    <a href="#methodology">Metodologi PPS</a>
                    <a href="#packages">Paket Program</a>
                    <a href="#corporate-executive-syllabus">Silabus Korporat</a>
                    <a href="#dokumentasi">Dokumentasi</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- KONTEN TETAP TAMPIL BIASA SEBAGAIMANA ASLINYA, TIDAK ADA PERUBAHAN LAYOUT -->
    <main class="main-content">
        <div class="container">
            <!-- Seluruh modul konten asli Anda tetap berada di sini tanpa ada perubahan -->
        </div>
    </main>

</body>
</html>
